name: Publish .NET container to GitHub Packages

on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  publish-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Playground.slnx

      - name: Publish container image
        run: dotnet publish src/BlazorApp/BlazorApp.csproj --configuration Release /t:PublishContainer -p:ContainerRepository=${{ github.repository_owner }}/blazorapp
        env:
          DOTNET_CONTAINER_REGISTRY_UNAME: ${{ github.actor }}
          DOTNET_CONTAINER_REGISTRY_PWORD: ${{ secrets.GITHUB_TOKEN }}
